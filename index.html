<!DOCTYPE html>
<!-- ⚠️ TEXT CONTENT: Edit text-config.js, not this file -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Primary meta (also in TEXT_CONFIG for JS use; hard-coded here for social crawlers) -->
  <title>Newfold Farm Crew · 1–4 May 2026</title>
  <meta name="description" content="Ey up. Three days camping at Newfold Farm, Edale. Walks, pizza, muddy kids, and the odd sheep." />

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
  <link rel="manifest" href="assets/site.webmanifest" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://dfmore.github.io/newfold-farm-crew/" />
  <meta property="og:title" content="Newfold Farm Crew · 1–4 May 2026" />
  <meta property="og:description" content="Ey up. Three days camping at Newfold Farm, Edale. Walks, pizza, muddy kids, and the odd sheep." />
  <meta property="og:image" content="https://dfmore.github.io/newfold-farm-crew/assets/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Newfold Farm Crew · 1–4 May 2026" />
  <meta name="twitter:description" content="Ey up. Three days camping at Newfold Farm, Edale. Walks, pizza, muddy kids, and the odd sheep." />
  <meta name="twitter:image" content="https://dfmore.github.io/newfold-farm-crew/assets/og-image.png" />

  <meta name="theme-color" content="#4a7c59" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <!-- Text config MUST load before app.js -->
  <script src="text-config.js"></script>
</head>
<body>

  <!-- ========================================================
       TAB NAVIGATION
       ======================================================== -->
  <div class="tab-nav-wrap">
    <nav class="tab-nav" role="tablist" aria-label="Site sections">
      <button role="tab" id="tab-home" aria-controls="panel-home" aria-selected="true" class="tab-btn">🏕️ Home</button>
      <button role="tab" id="tab-getting-there" aria-controls="panel-getting-there" aria-selected="false" class="tab-btn">🗺️ Getting There</button>
      <button role="tab" id="tab-peaks" aria-controls="panel-peaks" aria-selected="false" class="tab-btn">⛰️ The Peaks</button>
      <button role="tab" id="tab-kit" aria-controls="panel-kit" aria-selected="false" class="tab-btn">🎒 Kit List</button>
      <button role="tab" id="tab-kids" aria-controls="panel-kids" aria-selected="false" class="tab-btn">🎮 Kids' Corner</button>
      <button role="tab" id="tab-photos" aria-controls="panel-photos" aria-selected="false" class="tab-btn">📸 Photos</button>
    </nav>
    <span class="tab-scroll-hint" aria-hidden="true">›</span>
  </div>

  <!-- ========================================================
       PANEL: HOME (hero + mission + plan)
       ======================================================== -->
  <section role="tabpanel" id="panel-home" aria-labelledby="tab-home">

    <!-- Hero -->
    <header id="hero" class="hero" role="banner">
      <img
        class="hero-bg"
        src="assets/peaks/vale-of-edale-1280.jpg"
        srcset="assets/peaks/vale-of-edale-640.jpg 640w,
                assets/peaks/vale-of-edale-1280.jpg 1280w"
        sizes="100vw"
        alt=""
        aria-hidden="true"
        fetchpriority="high"
      >
      <div class="hero-overlay" aria-hidden="true"></div>
      <div class="hero-content">
        <h1 id="hero-headline">Loading…</h1>
        <p id="hero-subtitle">Loading…</p>
      </div>
    </header>

    <!-- Today's Mission -->
    <div id="mission" aria-labelledby="mission-heading">
      <div class="container">
        <h2 id="mission-heading">Loading…</h2>
        <p class="mission-text" id="mission-text">Loading…</p>
      </div>
    </div>

    <!-- The Plan -->
    <div id="plan" class="panel-section">
      <div class="container">
        <div class="section-heading">
          <span class="emoji" aria-hidden="true">📅</span>
          <h2 id="plan-heading">Loading…</h2>
        </div>
        <p class="disclaimer-note" id="plan-prelude" role="note"></p>
        <ul class="plan-list" id="plan-list" aria-label="Itinerary">
          <!-- populated by JS -->
        </ul>
      </div>
    </div>

  </section>

  <!-- ========================================================
       PANEL: GETTING THERE
       ======================================================== -->
  <section role="tabpanel" id="panel-getting-there" aria-labelledby="tab-getting-there" hidden>
    <div class="panel-section">
      <div class="container">
        <div class="section-heading">
          <span class="emoji" aria-hidden="true">🗺️</span>
          <h2 id="getting-there-heading">Loading…</h2>
        </div>
        <div class="card">
          <div class="info-grid" id="getting-there-grid">
            <!-- populated by JS -->
          </div>
          <div class="links-row" id="getting-there-links">
            <!-- populated by JS -->
          </div>
        </div>

        <!-- Campsite site map -->
        <figure class="site-map-figure">
          <img src="assets/site-map.webp" alt="Newfold Farm campsite map — Grouse Field is in the bottom-left" class="site-map-img" loading="lazy">
          <figcaption>We're on <strong>Grouse Field</strong> — bottom-left of the map.</figcaption>
        </figure>

        <!-- Google Maps embed -->
        <div class="map-wrapper">
          <iframe
            src="https://www.google.com/maps?q=Newfold+Farm+Edale+S33+7ZD&output=embed"
            width="100%" height="280" style="border:0; border-radius:12px;"
            loading="lazy" referrerpolicy="no-referrer-when-downgrade"
            aria-label="Map of Newfold Farm, Edale"
            title="Map of Newfold Farm, Edale"></iframe>
        </div>

        <!-- Weather links in Getting There panel -->
        <div class="weather-block">
          <div class="section-heading">
            <span class="emoji" aria-hidden="true">🌤️</span>
            <h2 id="weather-heading">Loading…</h2>
          </div>
          <p class="section-intro" id="weather-intro">Loading…</p>
          <div class="weather-links" id="weather-links">
            <!-- populated by JS -->
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ========================================================
       PANEL: THE PEAKS
       ======================================================== -->
  <section role="tabpanel" id="panel-peaks" aria-labelledby="tab-peaks" hidden>
    <div class="panel-section">
      <div class="container">
        <div class="section-heading">
          <span class="emoji" aria-hidden="true">🏔️</span>
          <h2 id="peaks-heading">Loading…</h2>
        </div>
        <div class="peaks-groups" id="peaks-groups">
          <!-- populated by JS -->
        </div>
        <div id="peaks-flavour">
          <!-- populated by JS -->
        </div>
      </div>
    </div>
  </section>

  <!-- ========================================================
       PANEL: KIT LIST
       ======================================================== -->
  <section role="tabpanel" id="panel-kit" aria-labelledby="tab-kit" hidden>
    <div class="panel-section">
      <div class="container">
        <div class="section-heading">
          <span class="emoji" aria-hidden="true">🎒</span>
          <h2 id="checklist-heading">Loading…</h2>
        </div>
        <div class="checklist-toolbar">
          <button class="btn btn--outline btn--sm" id="checklist-reset">Loading…</button>
        </div>
        <!-- Kit drill-down root: either category grid or item list -->
        <div id="kit-root">
          <!-- populated by initKitList() -->
        </div>
      </div>
    </div>
  </section>

  <!-- ========================================================
       PANEL: KIDS' CORNER
       ======================================================== -->
  <section role="tabpanel" id="panel-kids" aria-labelledby="tab-kids" hidden>
    <div class="panel-section">
      <div class="container--wide">
        <div class="section-heading">
          <span class="emoji" aria-hidden="true">🧒</span>
          <h2 id="kids-corner-heading"></h2>
        </div>
        <p class="disclaimer-note" id="kids-corner-disclaimer" role="note">Loading…</p>
        <div class="kids-grid">

          <!-- Nature Bingo -->
          <div class="bingo-card" role="region" aria-labelledby="bingo-heading">
            <h3 id="bingo-heading">Loading…</h3>
            <div class="bingo-banner" id="bingo-banner" role="status" aria-live="polite">Loading…</div>
            <div class="bingo-grid" id="bingo-grid" role="grid" aria-label="Nature Bingo">
              <!-- populated by JS -->
            </div>
            <div class="bingo-actions">
              <button class="btn btn--sm btn--outline" id="bingo-reshuffle">Loading…</button>
            </div>
          </div>

          <!-- Squelch-o-Meter -->
          <div class="squelch-card" role="region" aria-labelledby="squelch-heading">
            <h3 id="squelch-heading">Loading…</h3>
            <p class="squelch-subhead" id="squelch-subhead">Loading…</p>
            <div class="squelch-reveal" id="squelch-reveal" role="status" aria-live="polite">
              <strong id="squelch-reveal-text"></strong>
              <span id="squelch-reveal-score"></span>
            </div>
            <p class="squelch-empty" id="squelch-empty" aria-live="polite">Loading…</p>
            <div class="squelch-kids" id="squelch-kids">
              <!-- populated by JS -->
            </div>
            <div class="squelch-add-row">
              <input type="text" id="squelch-name-input" maxlength="30" autocomplete="off">
              <button class="btn btn--sm" id="squelch-add-btn">Loading…</button>
            </div>
          </div>

        </div>
        <!-- Mission nudge -->
        <p class="mission-nudge" id="mission-nudge"></p>
      </div>
    </div>
  </section>

  <!-- ========================================================
       PANEL: PHOTOS (memory wall + QR)
       ======================================================== -->
  <section role="tabpanel" id="panel-photos" aria-labelledby="tab-photos" hidden>
    <div class="panel-section">
      <div class="container">

        <!-- Memory Wall -->
        <div id="memory-wall" aria-labelledby="memory-wall-heading">
          <div class="section-heading" style="justify-content:center">
            <span class="emoji" aria-hidden="true">📸</span>
            <h2 id="memory-wall-heading">Loading…</h2>
          </div>
          <div class="memory-body">
            <p id="memory-wall-body">Loading…</p>
            <p class="memory-subhead" id="memory-wall-subhead">Loading…</p>
          </div>
          <a href="#" class="btn btn--amber" id="memory-wall-btn" target="_blank" rel="noopener">Loading…</a>
          <p class="memory-pending" id="memory-wall-pending" hidden>Loading…</p>
        </div>

        <!-- Share / QR -->
        <div id="share" aria-labelledby="share-heading">
          <div class="share-card">
            <h2 id="share-heading">Loading…</h2>
            <p id="share-body">Loading…</p>
            <div id="qr-canvas" aria-label="QR code to this site"></div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- ========================================================
       FOOTER
       ======================================================== -->
  <footer id="footer" class="site-footer" role="contentinfo">
    <p id="footer-campsite">Loading…</p>
    <p id="footer-phone">Loading…</p>
    <p class="footer-wink" id="footer-wink">Loading…</p>
    <p class="footer-credit" id="footer-hero-credit"></p>
    <p class="footer-credit" id="footer-peaks-credit"></p>
  </footer>

  <!-- QR code library (vendored, offline-reliable) -->
  <script src="vendor/qrcode.min.js"></script>

  <!-- Main app logic -->
  <script src="app.js"></script>

</body>
</html>
